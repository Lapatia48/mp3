# --- PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/mp3
spring.datasource.username=postgres
spring.datasource.password=lapatia1706
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- Stockage permanent des MP3 (relatif a back/) ---
