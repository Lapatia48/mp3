spring.application.name=mp3

# Profil par defaut = API (Partie 2). Les programmes standalone s'activent
# explicitement via --spring.profiles.active=scanner|extractor|uploader.
spring.profiles.default=api

# ============================================================
# RabbitMQ (commun aux 3 programmes)
# ============================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ============================================================
# Repertoires (Partie 1) - relatifs au repertoire de lancement (back/)
# ============================================================
app.incoming-dir=incoming
app.failed-dir=failed

# ============================================================
# Programme 1 : Scanner
# ============================================================
# Intervalle entre deux scans (ms). 300000 = 5 minutes.
app.scan.interval-ms=300000
app.scan.initial-delay-ms=3000

# ============================================================
# Programme 3 : Uploader
# ============================================================
app.api.upload-url=http://localhost:8080/api/tracks/upload
app.upload.max-retries=3
app.upload.retry-delay-ms=2000
